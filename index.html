<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metric Converter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="containter">
        <div class="box">
            <input type="number" id="input" placeholder="Enter a value">
            <select id="unit-in">
                <option value="1">Kilobits</option>
                <option value="1024">Megabits</option>
                <option value="1048576">Gigabits</option>
            </select>
        </div>
        <div class="box">
            <input type="number" id="output" placeholder="Enter a value">
            <select id="unit-out">
                <option value="1">Kilobytes</option>
                <option value="1024">Megabytes</option>
                <option value="1048576">Gigabytes</option>
            </select>
        </div>
    </div>
</body>
</html>
